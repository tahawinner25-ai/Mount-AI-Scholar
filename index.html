<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0f172a">
    <meta name="description" content="Mount AI Scholar - Moteur IA d'apprentissage et d'accessibilité cognitive pour la dyslexie et les troubles de l'apprentissage.">
    <link rel="apple-touch-icon" href="/pwa-192x192.svg">
    <link rel="manifest" href="/manifest.webmanifest">
    <title>Mount AI Scholar — Cognitive Suite</title>
    <script>
      // Progressive Silent SW Registration & Obsolete Purge
      (function() {
        var logs = [];
        window.addEventListener('error', function(e) {
          logs.push('[Error] ' + e.message + ' (' + e.filename + ':' + e.lineno + ')');
        }, true);

        // Register standard PWA Service Worker
        if ('serviceWorker' in navigator) {
          window.addEventListener('load', function() {
            navigator.serviceWorker.register('/sw.js')
              .then(function(reg) {
                console.log('⚡ [PWA] Service Worker registered successfully:', reg.scope);
              })
              .catch(function(err) {
                console.error('[PWA] Service Worker registration failed:', err);
                logs.push('[SW Register Error] ' + err);
              });

            // Clean up obsolete service workers (anything not sw.js)
            navigator.serviceWorker.getRegistrations().then(function(regs) {
              if (regs && regs.length > 0) {
                regs.forEach(function(reg) {
                  var scriptURL = reg.active ? reg.active.scriptURL : (reg.installing ? reg.installing.scriptURL : '');
                  if (scriptURL && !scriptURL.includes('sw.js')) {
                    reg.unregister().then(function() {
                      console.log('🧹 [PWA] Unregistered obsolete Service Worker:', scriptURL);
                    });
                  }
                });
              }
            });
          });
        }

        // Silent Fallback: if React hasn't rendered after 3 seconds, forcefully refresh once
        setTimeout(function() {
          var root = document.getElementById('root');
          if (!root || !root.innerHTML.trim()) {
            if (!sessionStorage.getItem('__auto_refreshed')) {
              sessionStorage.setItem('__auto_refreshed', 'true');
              if (window.caches) {
                caches.keys().then(function(keys) {
                  var p = keys.map(function(k) { return caches.delete(k); });
                  Promise.all(p).then(function() {
                    window.location.reload();
                  }).catch(function() {
                    window.location.reload();
                  });
                });
              } else {
                window.location.reload();
              }
            } else {
              // If already refreshed once and still blank, show a micro clean button
              var btn = document.createElement('button');
              btn.textContent = "Réinitialiser et Forcer la Mise à jour 🔄";
              btn.style.position = 'fixed';
              btn.style.bottom = '16px';
              btn.style.left = '50%';
              btn.style.transform = 'translateX(-50%)';
              btn.style.zIndex = '999999';
              btn.style.padding = '12px 20px';
              btn.style.background = '#3b82f6';
              btn.style.color = '#fff';
              btn.style.fontWeight = 'bold';
              btn.style.border = 'none';
              btn.style.borderRadius = '30px';
              btn.style.boxShadow = '0 10px 15px -3px rgba(59, 130, 246, 0.4)';
              btn.style.cursor = 'pointer';
              btn.style.fontFamily = 'sans-serif';
              btn.style.fontSize = '13px';
              btn.addEventListener('click', function() {
                sessionStorage.removeItem('__auto_refreshed');
                if ('serviceWorker' in navigator) {
                  navigator.serviceWorker.getRegistrations().then(function(regs) {
                    var promises = regs.map(function(r) { return r.unregister(); });
                    Promise.all(promises).then(function() {
                      if (window.caches) {
                        caches.keys().then(function(keys) {
                          Promise.all(keys.map(function(k) { return caches.delete(k); })).then(function() {
                            window.location.reload();
                          });
                        });
                      } else {
                        window.location.reload();
                      }
                    });
                  });
                } else {
                  window.location.reload();
                }
              });
              if (document.body) {
                document.body.appendChild(btn);
              } else {
                window.addEventListener('DOMContentLoaded', function() {
                  document.body.appendChild(btn);
                });
              }
            }
          }
        }, 3000);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
