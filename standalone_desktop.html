<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mount AI Scholar - Local Edge Edition</title>
    
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        slate: {
                            800: '#1e293b',
                            900: '#0f172a',
                            950: '#020617',
                        }
                    }
                }
            }
        }
    </script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-50 min-h-screen selection:bg-blue-500/30">

    <!-- Header Navigation -->
    <header class="border-b border-slate-800/60 bg-slate-950/50 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex flex-col md:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-3">
                <div class="p-2 rounded-xl bg-orange-600 shadow-lg shadow-orange-950/20">
                    <i data-lucide="brain-circuit" class="w-6 h-6 text-white"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-tight">Mount AI<span class="text-orange-500">: Scholar</span></h1>
                    <p class="text-[10px] font-mono text-slate-500 uppercase tracking-widest">Gemma 4 Edge (Localhost)</p>
                </div>
            </div>
            
            <div class="flex items-center gap-4 text-xs font-mono">
                <div class="flex items-center gap-2 bg-slate-900 px-4 py-2 rounded-full border border-emerald-500/50">
                    <div class="w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.5)]"></div>
                    <span class="text-emerald-400">Backend Local Actif</span>
                    <i data-lucide="settings" class="w-3 h-3 text-slate-500 ml-1"></i>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-12 lg:py-20 animate-fade-in">
        <!-- Hero Section -->
        <section class="text-center space-y-6 mb-16">
            <div class="inline-flex items-center justify-center p-4 rounded-3xl bg-slate-900 border border-slate-800 shadow-2xl">
                <i data-lucide="cpu" class="w-12 h-12 text-blue-500"></i>
            </div>
            <h1 class="text-5xl font-extrabold tracking-tight text-white">
                Mount AI <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-500 to-orange-500">Scholar</span>
            </h1>
            <p class="text-lg text-slate-400 max-w-2xl mx-auto font-light">
                High-performance environment for cognitive accessibility. Mode Local Windows.
            </p>
        </section>

        <!-- Configuration Section avec <label> réclamés -->
        <section class="max-w-2xl mx-auto mb-16">
            <div class="glass-panel rounded-[2rem] p-8 shadow-2xl">
                <h2 class="text-lg font-bold text-white mb-6 uppercase tracking-widest flex items-center gap-3">
                    <i data-lucide="sliders-horizontal" class="w-5 h-5 text-orange-500"></i>
                    Configuration Moteur
                </h2>
                
                <form id="engine-config" class="space-y-6">
                    <!-- Champ 1 -->
                    <div class="flex flex-col gap-2">
                        <label for="accessMode" class="text-xs font-bold text-slate-400 uppercase tracking-widest">
                            Mode d'Accessibilité
                        </label>
                        <div class="relative">
                            <select id="accessMode" class="w-full appearance-none bg-slate-900 border border-slate-700 text-white rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all font-medium cursor-pointer">
                                <option value="dyslexie">🧠 Dyslexie (Phonèmes assistés)</option>
                                <option value="learning">📚 Apprentissage Global (Gemma 4)</option>
                            </select>
                            <i data-lucide="chevron-down" class="absolute right-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 pointer-events-none"></i>
                        </div>
                    </div>

                    <!-- Champ 2 -->
                    <div class="flex flex-col gap-2">
                        <label for="targetLang" class="text-xs font-bold text-slate-400 uppercase tracking-widest">
                            Langue Cible (8 Langues)
                        </label>
                        <div class="relative">
                            <select id="targetLang" class="w-full appearance-none bg-slate-900 border border-slate-700 text-white rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-orange-500 transition-all font-medium cursor-pointer">
                                <option value="fr">Français</option>
                                <option value="en">English (Anglais)</option>
                                <option value="ar">العربية (Arabe)</option>
                                <option value="es">Español (Espagnol)</option>
                            </select>
                            <i data-lucide="chevron-down" class="absolute right-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 pointer-events-none"></i>
                        </div>
                    </div>
                </form>
            </div>
        </section>

        <!-- Modules Grid (Comme le React) -->
        <section class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 max-w-6xl mx-auto">
            <!-- Card 1 -->
            <button onclick="document.getElementById('accessMode').value='dyslexie'" class="group relative overflow-hidden bg-slate-900 rounded-[2.5rem] p-8 border border-slate-800 hover:border-blue-500/50 transition-all duration-500 text-left flex flex-col h-full shadow-xl hover:-translate-y-2">
                <div class="w-14 h-14 rounded-2xl bg-blue-600/20 border border-blue-500/30 flex items-center justify-center mb-6">
                    <i data-lucide="mic" class="w-7 h-7 text-blue-500"></i>
                </div>
                <h2 class="text-2xl font-bold text-white mb-3 tracking-tight">Phonemic Analysis</h2>
                <p class="text-slate-400 leading-relaxed text-sm flex-1">
                    Real-time voice processing engine. Prêt pour l'inférence locale.
                </p>
                <div class="mt-6 flex items-center gap-2 text-blue-500 font-bold uppercase tracking-wider text-xs">
                    Activer Module <i data-lucide="sparkles" class="w-4 h-4 ml-1"></i>
                </div>
            </button>

            <!-- Card 2 -->
            <button onclick="document.getElementById('accessMode').value='learning'" class="group relative overflow-hidden bg-slate-900 rounded-[2.5rem] p-8 border border-slate-800 hover:border-orange-500/50 transition-all duration-500 text-left flex flex-col h-full shadow-xl hover:-translate-y-2">
                <div class="w-14 h-14 rounded-2xl bg-orange-600/20 border border-orange-500/30 flex items-center justify-center mb-6">
                    <i data-lucide="layers" class="w-7 h-7 text-orange-500"></i>
                </div>
                <h2 class="text-2xl font-bold text-white mb-3 tracking-tight">Cognitive Intelligence</h2>
                <p class="text-slate-400 leading-relaxed text-sm flex-1">
                    Extraction sémantique structurée par LLM (Gemma 4 Local). Privacy by design.
                </p>
                <div class="mt-6 flex items-center gap-2 text-orange-500 font-bold uppercase tracking-wider text-xs">
                    Launch Engine <i data-lucide="zap" class="w-4 h-4 ml-1"></i>
                </div>
            </button>

            <!-- Card 3 -->
            <button class="group relative overflow-hidden bg-slate-900 rounded-[2.5rem] p-8 border border-emerald-500/20 hover:border-emerald-500/50 transition-all duration-500 text-left flex flex-col h-full shadow-xl hover:-translate-y-2">
                <div class="w-14 h-14 rounded-2xl bg-emerald-600/20 border border-emerald-500/30 flex items-center justify-center mb-6">
                    <i data-lucide="activity" class="w-7 h-7 text-emerald-500"></i>
                </div>
                <h2 class="text-2xl font-bold text-white mb-3 tracking-tight">System Logs</h2>
                <p class="text-slate-400 leading-relaxed text-sm flex-1 font-mono text-xs">
                    FASTAPI: Running on port 8000<br>
                    MEM: 4.2GB / 16GB<br>
                    LATENCY: 14ms
                </p>
                <div class="mt-6 flex items-center gap-2 text-emerald-500 font-bold uppercase tracking-wider text-xs">
                    IT Architecture <i data-lucide="terminal" class="w-4 h-4 ml-1"></i>
                </div>
            </button>
        </section>

    </main>

    <!-- Footer -->
    <footer class="max-w-7xl mx-auto px-6 py-8 border-t border-slate-800 flex justify-center opacity-80 mt-12">
        <div class="flex items-center gap-4 text-xs text-slate-500 font-mono">
            <span>0xDEADBEEF / WINDOWS_LOCAL_EDITION</span>
            <span>|</span>
            <span class="text-orange-400">CEO : Taha DEV Junior</span>
        </div>
    </footer>

    <!-- Initialize Icons -->
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
